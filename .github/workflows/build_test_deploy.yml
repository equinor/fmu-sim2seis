name: Build, test and (if release) deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: "Test: Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: uv pip install --system ".[tests]"

      - name: "Test: pytest"
        run: pytest tests/

  release-please:
    name: release-please
    if: github.ref_name == 'main'
    needs: test
    permissions:
      issues: write
      contents: write
      pull-requests: write
    uses: ./.github/workflows/release-please.yml

  build:
    name: Build
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Package
        run: |
          uv pip install --system build
          export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_FMU_SIM2SEIS="${{ needs.release-please.outputs.tag_name }}"
          export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_FMU_SIM2SEIS="${SETUPTOOLS_SCM_PRETEND_VERSION_FOR_FMU_SIM2SEIS#v}"
          python -m build

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v6
        with:
          name: fmu-sim2seis-dist
          path: dist/

  update-documentation:
    name: Update Documentation
    if: github.ref_name == 'main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.11, with uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.11
          enable_cache: true

      - name: Install Python Dependencies
        run: uv pip install --system .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: documentation/package-lock.json

      - name: Install Node Dependencies
        working-directory: ./documentation
        run: npm ci

      - name: Create JSON Schema
        working-directory: ./documentation
        run: npm run create-json-schema

      - name: Build Documentation
        working-directory: ./documentation
        run: npm run docs:build

      - name: Deploy Documentation to GitHub Pages
        run: |
          # Move the built documentation out of working directory, in order to delete everything else afterwards
          cp -R ./documentation/docs/.vitepress/dist ../dist

          git config --local user.email "fmu-sim2seis-github-action"
          git config --local user.name "fmu-sim2seis-github-action"
          git fetch origin gh-pages
          git checkout -f --track origin/gh-pages
          git clean -f -f -d -x
          git rm -r *

          cp -R ../dist/* .

          git add .

          if git diff-index --quiet HEAD; then
            echo "No changes in documentation. Skip documentation deploy."
          else
            git commit -m "Update GitHub Pages"
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
          fi

  deploy:
    name: Publish Package to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fmu-sim2seis
    permissions:
      id-token: write # required for trusted publishing to PyPI

    steps:
      - name: Download Package Artifact
        uses: actions/download-artifact@v4
        with:
          name: fmu-sim2seis-dist
          path: dist/

      - name: Publish Package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
